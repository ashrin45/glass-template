<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glass Template</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <script src="assets/js/bg-mesh.js"></script>

    <header class="course-header">
        <h1>Mon Projet</h1>
        <p>Description du projet</p>
    </header>

    <main class="container">

        <!-- Section exemple -->
        <section class="section">
            <div class="section-intro">
                <h2>Section titre</h2>
                <p>Contenu de la section.</p>
            </div>

            <div class="info-box note">
                <strong>Information</strong>
                <p style="margin-bottom: 0;">Ceci est une info-box bleue.</p>
            </div>

            <div class="info-box tip">
                <strong>Astuce</strong>
                <p style="margin-bottom: 0;">Ceci est une info-box verte.</p>
            </div>

            <div class="info-box warning">
                <strong>Attention</strong>
                <p style="margin-bottom: 0;">Ceci est une info-box jaune.</p>
            </div>
        </section>

        <!-- Demo interactive -->
        <section class="section">
            <h2>Composants</h2>

            <div class="demo-container">
                <h4>Boutons</h4>
                <div class="btn-group">
                    <button class="btn btn-primary">Primaire</button>
                    <button class="btn btn-secondary">Secondaire</button>
                    <button class="btn btn-secondary active">Actif</button>
                </div>
            </div>

            <div class="formula">
                Formule : f(x) = ax + b
            </div>

            <div class="slider-group">
                <div class="slider-row">
                    <label>Parametre</label>
                    <input type="range" min="0" max="100" value="50">
                    <span class="value-display">50</span>
                </div>
            </div>
        </section>

    </main>

</body>
</html>
